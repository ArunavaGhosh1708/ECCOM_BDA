apiVersion: apps/v1
kind: Deployment
metadata:
  name: trendtrove-app-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trendtrove-app-v2
  template:
    metadata:
      labels:
        app: trendtrove-app-v2
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: app
          image: us-central1-docker.pkg.dev/canaryguard-bda/canaryguard/trendtrove-app:v2-20260413-190159
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: trendtrove-secrets
            - configMapRef:
                name: trendtrove-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: FAIL_MODE
              value: "auth"
            - name: SERVICE_NAME
              value: app-service-v2
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3000
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:3000
            - name: CART_SERVICE_URL
              value: http://cart-service:3000
            - name: MAIL_SERVICE_URL
              value: http://mail-service:3000
---
apiVersion: v1
kind: Service
metadata:
  name: app-service-v2
  labels:
    app: trendtrove-app-v2
spec:
  selector:
    app: trendtrove-app-v2
  ports:
    - name: http
      port: 3000
      targetPort: 3000
