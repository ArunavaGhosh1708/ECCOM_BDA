apiVersion: batch/v1
kind: Job
metadata:
  name: k6-canary-auth-test
  namespace: default
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.54.0
          args:
            - run
            - /scripts/canary-auth-test.js
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: k6-canary-auth-script
